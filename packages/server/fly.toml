# packages/server/fly.toml
app = "necro-vs-crown-server"
primary_region = "lhr"  # pick your region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "2567"

[[services]]
  internal_port = 2567
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]